services:
  web:
    build: .
    restart: unless-stopped
    ports:
      - "8000:8000"
    env_file:
      - .env
    environment:
      DJANGO_ALLOWED_HOSTS: "localhost,127.0.0.1"
      DB_PATH: /data/db.sqlite3
      REDIS_URL: redis://redis:6379/0
    volumes:
      - caryard_data:/data
      - caryard_media:/app/media
      - caryard_static:/app/assets
    depends_on:
      redis:
        condition: service_healthy

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    command: redis-server --appendonly yes
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10

volumes:
  caryard_data:
  caryard_media:
  caryard_static:
  redis_data:
